name: tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: python -m unittest discover -s tests
        env: {PYTHONPATH: plugins/codex-telegram-notifier/src}
      - run: python -m compileall plugins/codex-telegram-notifier/src plugins/codex-telegram-notifier/scripts
