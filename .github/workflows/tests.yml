name: tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - run: node --check plugins/codex-telegram-notifier/scripts/codex_telegram_notifier.js
      - run: node --check plugins/codex-telegram-notifier/scripts/setup_server.js
